apiVersion: v1
kind: Namespace
metadata:
  name: airbnb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traveler-service
  namespace: airbnb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traveler
  template:
    metadata:
      labels:
        app: traveler
    spec:
      containers:
      - name: traveler
        image: airbnb-backend:latest
        ports:
        - containerPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-service
  namespace: airbnb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: owner
  template:
    metadata:
      labels:
        app: owner
    spec:
      containers:
      - name: owner
        image: airbnb-backend:latest
        ports:
        - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: airbnb
spec:
  ports:
  - port: 27017
  selector:
    app: mongodb
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: airbnb
spec:
  ports:
  - port: 9092
  selector:
    app: kafka
